# Holocron CLI and plugins — pinned in lockstep; bump together when running setup.
catalogs:
  holocron:
    '@theholocron/cli': '>=2.0.0-alpha.0 <2.0.0'
    '@theholocron/holocron-plugin-github': '>=2.0.0-alpha.0 <2.0.0'

# Force a single TypeScript version across the graph so cosmiconfig doesn't
# pick up a transitive TypeScript 7 when loading .ts config files.
overrides:
  typescript: ^5.9.3
